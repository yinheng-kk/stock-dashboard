<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业超额预警 MVP（通达信接口）</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
        }
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .status-card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }
        .status-card .label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }
        .status-card .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff88;
        }
        .status-card.alert-high .value {
            color: #ff4444;
        }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-row.full {
            grid-template-columns: 1fr;
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            height: 400px;
        }
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        table th {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }
        table td {
            padding: 10px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }
        table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        .up {
            color: #ff6b6b;
        }
        .down {
            color: #51cf66;
        }
        .neutral {
            color: #ffd43b;
        }
        .refresh-btn {
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
        .update-time {
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 行业超额预警 MVP</h1>
            <p>监控通达信行业指数 vs 中证1000 | C=当日超额 · C5=5日滚动 · D=各行业C5的TOP20均值 · 预警 C≥D</p>
        </div>

        <div class="status-bar">
            <div class="status-card">
                <div class="label">监控行业</div>
                <div class="value" id="industryCount">--</div>
            </div>
            <div class="status-card">
                <div class="label">中证 1000 涨幅</div>
                <div class="value" id="zz1000Value" style="color: #ffd43b;">--</div>
            </div>
            <div class="status-card">
                <div class="label">D值（C5 TOP20均值）</div>
                <div class="value" id="dValue" style="color: #00ff88;">--</div>
            </div>
            <div class="status-card alert-high">
                <div class="label">预警行业数</div>
                <div class="value" id="alertCount">--</div>
            </div>
        </div>

        <div class="chart-row full">
            <div class="chart-container">
                <div id="chartTop20" style="height: 100%;"></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-container">
                <div id="chartScatter" style="height: 100%;"></div>
            </div>
            <div class="chart-container">
                <div id="chartDistribution" style="height: 100%;"></div>
            </div>
        </div>

        <div class="table-container">
            <h3 style="margin-bottom: 15px;">⚠️ 预警行业列表（当日 C ≥ D值）</h3>
            <table id="alertTable">
                <thead>
                    <tr>
                        <th>行业代码</th>
                        <th>行业名称</th>
                        <th>当日涨幅（%）</th>
                        <th>当日 C（超额%）</th>
                        <th>C5（5日滚动%）</th>
                        <th>D值（%）</th>
                        <th>警告等级</th>
                    </tr>
                </thead>
                <tbody id="alertTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; color: #aaa;">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button class="refresh-btn" onclick="loadData()">🔄 手动刷新</button>
            <div class="update-time">
                数据更新时间: <span id="updateTime">--</span> | 每 5 分钟自动更新
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chartTop20, chartScatter, chartDistribution;

        // 初始化图表
        function initCharts() {
            chartTop20 = echarts.init(document.getElementById('chartTop20'));
            chartScatter = echarts.init(document.getElementById('chartScatter'));
            chartDistribution = echarts.init(document.getElementById('chartDistribution'));

            // 响应式重绘
            window.addEventListener('resize', () => {
                chartTop20.resize();
                chartScatter.resize();
                chartDistribution.resize();
            });
        }

        // 加载数据
        async function loadData() {
            try {
                // 尝试从本地文件读取（需要 HTTP 服务）
                const response = await fetch('industry_alerts.json?t=' + Date.now());
                if (!response.ok) throw new Error('无法读取数据文件');

                const data = await response.json();

                // 更新状态卡
                document.getElementById('industryCount').textContent =
                    (data.industry_count ?? 0);
                document.getElementById('zz1000Value').textContent =
                    (data.zz1000?.pct ?? 0).toFixed(2) + '%';
                document.getElementById('dValue').textContent =
                    (data.D ?? 0).toFixed(2) + '%';
                document.getElementById('alertCount').textContent =
                    (data.alert_count ?? 0);
                document.getElementById('updateTime').textContent =
                    data.timestamp || '--';

                // 更新表格
                updateAlertTable(data.alerts, data.D);

                // 更新图表
                updateCharts(data);

            } catch (error) {
                console.error('数据加载失败:', error);
                document.getElementById('industryCount').textContent = '❌';
                document.getElementById('alertCount').textContent = '无法加载';
                document.getElementById('updateTime').textContent = '错误: ' + error.message;
            }
        }

        // 更新预警表格
        function updateAlertTable(alerts, dValue) {
            const tbody = document.getElementById('alertTableBody');
            tbody.innerHTML = '';

            if (!alerts || alerts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #aaa;">暂无预警</td></tr>';
                return;
            }

            alerts.slice(0, 20).forEach(a => {
                const row = document.createElement('tr');
                const C = a.C ?? 0, C5 = a.C5 ?? 0;
                // 警告等级: C 与 C5 同向且都强=高; C 强但 C5 为负=诱多/低质
                const level = (C >= 2 && C5 >= 2) ? '🔴 高(C5共振)'
                            : (C >= dValue && C5 < 0) ? '🟡 中(C5为负·疑诱多)'
                            : '🟢 低';
                row.innerHTML = `
                    <td><strong>${a.code}</strong></td>
                    <td>${a.name}</td>
                    <td class="up"><strong>${(a.pct ?? 0).toFixed(2)}</strong></td>
                    <td class="up"><strong>${C.toFixed(2)}</strong></td>
                    <td class="${C5 >= 0 ? 'up' : 'down'}"><strong>${C5.toFixed(2)}</strong></td>
                    <td><strong>${dValue.toFixed(2)}</strong></td>
                    <td>${level}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 更新图表
        function updateCharts(data) {
            const D = data.D ?? 0;
            const top20 = (data.top20_c5 || []).slice();  // 已按 C5 降序

            // 图表1: TOP20 行业 C5（5日滚动超额）条形图 + D阈值线
            chartTop20.setOption({
                title: { text: 'TOP 20 行业 · C5（5日滚动超额）', left: 'center', textStyle: { color: '#fff' } },
                tooltip: { trigger: 'axis' },
                grid: { left: '8%', right: '5%', top: '15%', bottom: '18%', containLabel: true },
                xAxis: { type: 'category', data: top20.map(x => x.name || x.code), axisLabel: { rotate: 45, color: '#bbb' } },
                yAxis: { type: 'value', name: 'C5 (%)', axisLabel: { color: '#bbb' } },
                series: [{
                    data: top20.map(x => x.C5),
                    type: 'bar',
                    markLine: { silent: true, data: [{ yAxis: D, name: 'D' }],
                        lineStyle: { color: '#ff4444' },
                        label: { formatter: 'D=' + D.toFixed(2), color: '#ff4444' } },
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#00d4ff' },
                            { offset: 1, color: '#00ff88' }
                        ])
                    }
                }]
            });

            // 图表2: 全行业 当日C vs C5 散点（识别诱多/共振）
            const all = data.all || [];
            chartScatter.setOption({
                title: { text: '当日C vs C5（右上=共振, 右下=疑诱多）', left: 'center', textStyle: { color: '#fff', fontSize: 13 } },
                tooltip: { trigger: 'item', formatter: p => `${p.data[2]}<br/>C=${p.data[0]}  C5=${p.data[1]}` },
                grid: { left: '12%', right: '8%', top: '18%', bottom: '12%', containLabel: true },
                xAxis: { type: 'value', name: '当日C', axisLabel: { color: '#bbb' } },
                yAxis: { type: 'value', name: 'C5', axisLabel: { color: '#bbb' } },
                series: [{
                    data: all.map(x => [x.C, x.C5, x.name]),
                    type: 'scatter', symbolSize: 7,
                    itemStyle: { color: p => (p.data[0] >= D ? '#ff4444' : '#00ff88') },
                    markLine: { silent: true, data: [{ xAxis: D }, { yAxis: 0 }], lineStyle: { color: '#888', type: 'dashed' } }
                }]
            });

            // 图表3: C5 区间分布（真实频率）
            const buckets = ['<-2', '-2~0', '0~2', '2~4', '>4'];
            const counts = [0, 0, 0, 0, 0];
            all.forEach(x => {
                const v = x.C5;
                if (v < -2) counts[0]++; else if (v < 0) counts[1]++;
                else if (v < 2) counts[2]++; else if (v < 4) counts[3]++; else counts[4]++;
            });
            chartDistribution.setOption({
                title: { text: 'C5 区间分布（全行业）', left: 'center', textStyle: { color: '#fff' } },
                tooltip: { trigger: 'axis' },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: buckets, axisLabel: { color: '#bbb' } },
                yAxis: { type: 'value', axisLabel: { color: '#bbb' } },
                series: [{ data: counts, type: 'bar', itemStyle: { color: '#ffd43b' } }]
            });
        }

        // 页面加载
        window.addEventListener('load', () => {
            initCharts();
            loadData();
            // 每5分钟自动刷新
            setInterval(loadData, 300000);
        });
    </script>
</body>
</html>
