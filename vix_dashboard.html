}).join('');

const thead=document.querySelector('#tbl thead');
thead.innerHTML='<tr><th>日期</th>'+IDX.map(n=>'<th>'+n+'</th>').join('')+'</tr>';
const tbody=document.querySelector('#tbl tbody');
const N=20; const start=Math.max(1,rows.length-N);
let html='';
for(let r=rows.length-1;r>=start;r--){
  const cur=rows[r], pv=rows[r-1];
  html+='<tr><td>'+cur.date+'</td>'+IDX.map(n=>
    '<td><span class="val">'+fmt(cur[n])+'</span>'+chgHtml(cur[n],pv?pv[n]:null)+'</td>').join('')+'</tr>';
}
tbody.innerHTML=html;

// chart last 120
const M=Math.min(120,rows.length); const sub=rows.slice(rows.length-M);
new Chart(document.getElementById('chart'),{
  type:'line',
  data:{labels:sub.map(r=>r.date),
    datasets:IDX.map((n,i)=>({label:n,data:sub.map(r=>r[n]),borderColor:COLORS[i],
      backgroundColor:'transparent',borderWidth:1.6,pointRadius:0,tension:.25}))},
  options:{responsive:true,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#e6edf3',boxWidth:12,font:{size:11}}}},
    scales:{x:{ticks:{color:'#8b98a9',maxTicksLimit:8,font:{size:10}},grid:{color:'#1e2735'}},
            y:{ticks:{color:'#8b98a9',font:{size:10}},grid:{color:'#1e2735'}}}}
});
</script>
</body>
</html>
