<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>资金流看板 · 升级复盘 · 改造前 vs 升级后</title>
<style>
  :root{ --bg:#0a0e1a; --gold:#f5c542; --red:#ff5b6e; --green:#36d399; --line:#1c2742; --txt:#e8eefc; --dim:#8aa0c8; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--txt); font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
  .hero{ padding:14px 16px 10px; background:linear-gradient(180deg,#0d1426,#0a0e1a); border-bottom:1px solid var(--line); }
  .hero h1{ margin:0 0 2px; font-size:19px; letter-spacing:.5px; }
  .hero h1 .g{ color:var(--gold); text-shadow:0 0 12px rgba(245,197,66,.5); }
  .hero .sub{ font-size:12px; color:var(--dim); }
  .changelog{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:10px 16px 14px; }
  .ci{ background:#0e1730; border:1px solid var(--line); border-radius:10px; padding:9px 11px; }
  .ci .n{ font-size:11px; color:var(--gold); font-weight:700; }
  .ci .t{ font-size:12.5px; margin-top:3px; line-height:1.45; color:var(--txt); }
  .ci .t b{ color:var(--green); }
  .stage{ display:grid; grid-template-columns:1fr 1fr; gap:0; height:calc(100vh - 158px); height:calc(100dvh - 158px); }
  .pane{ position:relative; min-width:0; border-right:1px solid var(--line); }
  .pane:last-child{ border-right:0; }
  .tag{ position:absolute; top:8px; left:8px; z-index:5; font-size:12px; font-weight:700; padding:4px 11px; border-radius:20px; backdrop-filter:blur(4px); }
  .tag.old{ background:rgba(138,160,200,.18); color:var(--dim); border:1px solid rgba(138,160,200,.4); }
  .tag.new{ background:rgba(245,197,66,.16); color:var(--gold); border:1px solid rgba(245,197,66,.5); box-shadow:0 0 14px rgba(245,197,66,.3); }
  iframe{ display:block; border:0; width:100%; height:100%; background:var(--bg); }
  .toggle{ display:none; }
  @media (max-width:760px){
    .changelog{ grid-template-columns:repeat(2,1fr); }
    .stage{ grid-template-columns:1fr; height:calc(100vh - 232px); height:calc(100dvh - 232px); }
    .pane{ border-right:0; }
    .pane.p_old{ display:none; }   /* 手机默认只显示当前选中,用切换钮换 */
    .pane.p_new{ display:block; }
    .toggle{ display:flex; gap:8px; padding:8px 16px 10px; }
    .toggle button{ flex:1; font-size:13px; font-weight:700; padding:9px; border-radius:8px; border:1px solid var(--line); background:#0e1730; color:var(--dim); }
    .toggle button.act{ background:rgba(245,197,66,.16); color:var(--gold); border-color:rgba(245,197,66,.5); }
    body.show-old .pane.p_old{ display:block; }
    body.show-old .pane.p_new{ display:none; }
  }
</style>
</head>
<body>
<div class="hero">
  <h1>资金流看板 · <span class="g">升级复盘</span></h1>
  <div class="sub">改造前(旧版) ⟷ 升级后(新版) · 2026-06-25 · 同屏对比本次 4 项升级</div>
</div>

<div class="changelog">
  <div class="ci"><div class="n">① 全场总览大字 KPI</div><div class="t">顶部新增 <b>主力净流入合计｜流入/流出板块数｜🔥吸金王｜📈领涨板块</b>,数字变动金色闪动</div></div>
  <div class="ci"><div class="n">② 26 线降噪</div><div class="t">TOP 流入/流出各 5 条 <b>加粗高亮+端部标名</b>,其余 16 条淡化变细</div></div>
  <div class="ci"><div class="n">③ TOP 榜增量箭头</div><div class="t">对比上一帧,变大标 <b>▲+x.xx 红闪</b>、变小标 ▼,把"实时在动"做实</div></div>
  <div class="ci"><div class="n">④ 板块加速度徽章</div><div class="t">末段斜率算,加速吸金标 <b>🔥加速</b>、加速流出标 撤离,比累计值更早抓异动</div></div>
</div>

<div class="toggle">
  <button id="btnOld" onclick="document.body.classList.add('show-old');setAct()">改造前(旧版)</button>
  <button id="btnNew" class="act" onclick="document.body.classList.remove('show-old');setAct()">升级后(新版)</button>
</div>

<div class="stage">
  <!-- sandbox 无 allow-same-origin → 源为 null,API CORS 白名单放行,实时数据可拉 -->
  <div class="pane p_old">
    <span class="tag old">改造前 · 旧版</span>
    <iframe src="./fundflow-nocoxchun-old.html" sandbox="allow-scripts allow-popups" referrerpolicy="no-referrer" title="旧版"></iframe>
  </div>
  <div class="pane p_new">
    <span class="tag new">升级后 · 新版</span>
    <iframe src="./fundflow-nocoxchun.html" sandbox="allow-scripts allow-popups" referrerpolicy="no-referrer" title="新版"></iframe>
  </div>
</div>

<script>
function setAct(){
  var old = document.body.classList.contains('show-old');
  document.getElementById('btnOld').classList.toggle('act', old);
  document.getElementById('btnNew').classList.toggle('act', !old);
}
</script>
</body>
</html>
